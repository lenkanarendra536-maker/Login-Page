<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0px;
            background-image: url("https://www.shutterstock.com/image-photo/security-reset-password-login-online-260nw-2223308159.jpg");
            background-size: cover;
            min-height: 100vh;
        }

        .main {

            padding: 1% 3% 3% 4%;
            border-radius: 25px;
            width: 30%;
            margin: auto;
            margin-top: 10%;
            margin-left: 10%;
        }

        .sub input {
            padding: 15px;
            width: 90%;
            margin-bottom: 10px;
            border-radius: 25px;
            border-color: 1px solid rgba(0, 0, 0, 0.5);
        }

        .main h3 {
            text-align: center;
            font-family: sans-serif;
            font-size: 30px;
            margin-right: 20px;
            margin-bottom: 30px;
        }     

        .btn-grad {
            background-image: linear-gradient(to right, #314755 0%, #26a0da 51%, #314755 100%);
        }

        .btn-grad {
            margin: 10px;
            width: 90%;
            margin-left: 3%;
            padding: 15px 45px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;
            box-shadow: 0 0 20px #eee;
            border-radius: 10px;
            display: block;
            outline: none;
            border: none;
            cursor: pointer;
        }

        .btn-grad:hover {
            background-position: right center;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <form class="main" action="./login.html">

        <h3>RESET PASSWORD</h3>

        <div class="sub">
            <input type="Password" placeholder="Enter New Password" required />
        </div>
        
        <div class="sub">
            <input type="Password" placeholder="Re-entered Password" required />
        </div>

        <button class="btn-grad">Reset Password</button>

    </form>
</body>

</html>
